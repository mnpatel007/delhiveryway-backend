# Render Blueprint — STAGING backend service.
#
# This defines ONLY the staging service. Your existing production service
# (delhiveryway-backend-1) was created manually and is NOT managed by this
# file, so applying this blueprint will not touch production.
#
# To apply: Render Dashboard -> New -> Blueprint -> connect the
# delhiveryway-backend repo. Render reads this file, creates the staging
# service tracking the `staging` branch, and prompts you to fill in every
# env var marked `sync: false` (the secrets) once.
#
# Secrets are intentionally NOT stored here. Use a SEPARATE staging MongoDB
# database and Stripe TEST keys — never point staging at the prod DB.

services:
  - type: web
    name: delhiveryway-backend-staging
    runtime: node
    region: singapore
    plan: free
    branch: staging
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # --- Non-secret config (safe to commit) ---
      - key: NODE_ENV
        value: staging
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MAX_FILE_SIZE
        value: '5242880'
      - key: UPLOAD_PATH
        value: ./uploads

      # --- Auto-generated per environment (never reuse the prod secret) ---
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true

      # --- Secrets: set once in the Render dashboard (sync: false) ---
      - key: MONGO_URI # staging database — NOT the prod cluster
        sync: false
      - key: ADMIN_EMAIL # built-in system admin (see adminController)
        sync: false
      - key: ADMIN_PASSWORD # use a strong, staging-only password
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY # Stripe TEST key for staging
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # --- Frontend origins for CORS (your Vercel staging URLs) ---
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_FRONTEND_URL
        sync: false
      - key: SHOPPER_FRONTEND_URL
        sync: false
      - key: SHOPKEEPER_FRONTEND_URL
        sync: false
      - key: VENDOR_FRONTEND_URL
        sync: false
