name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      # NOTE: This repo has a known pre-existing ESLint backlog, so lint is
      # informational (non-blocking) for now. The pre-commit hook still blocks
      # NEW errors in changed files. Remove continue-on-error once the backlog
      # is burned down to zero, to make lint enforcing.
      - name: ESLint (informational)
        run: npm run lint
        continue-on-error: true
